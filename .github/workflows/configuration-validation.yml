name: Configuration Validation

on:
  push:
    branches:
      - main
    paths:
      - "configs/**"
      - ".github/workflows/configuration-validation.yml"

  pull_request:
    paths:
      - "configs/**"
      - ".github/workflows/configuration-validation.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-configurations:
    name: Validate Patroni, etcd, and HAProxy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install YAML parser
        run: python -m pip install PyYAML

      - name: Validate Patroni and etcd YAML
        run: |
          python - <<'PY'
          from pathlib import Path

          import yaml

          files = [
              Path("configs/patroni/patroni.yml.example"),
              Path("configs/etcd/etcd.yml.example"),
          ]

          for path in files:
              with path.open(encoding="utf-8") as stream:
                  yaml.safe_load(stream)

              print(f"Valid YAML: {path}")
          PY

      - name: Install HAProxy
        run: |
          sudo apt-get update
          sudo apt-get install --yes haproxy

      - name: Validate HAProxy configuration
        run: |
          haproxy -c \
            -f configs/haproxy/haproxy.cfg.example
